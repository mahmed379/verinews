{% extends "base.html" %}

{% block title %}Edit Comment — VeriNews{% endblock %}

{% block content %}

<h2>Edit Comment</h2>

<form method="post">

    {% csrf_token %}

    {{ form.body }}

    <button type="submit" class="btn btn-primary mt-2">
        Save
    </button>

    <a href="{{ object.get_absolute_url }}"
       class="btn btn-secondary mt-2">
        Cancel
    </a>

</form>

{% endblock %}
