{% extends "base.html" %}

{% block title %}Delete Comment — VeriNews{% endblock %}

{% block content %}

<h2>Delete Comment?</h2>

<p>
    {{ object.body }}
</p>


<form method="post">

    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Delete
    </button>

    <a href="{{ object.get_absolute_url }}"
       class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
