{% extends "base.html" %}

{% block title %}Review Article — VeriNews{% endblock %}

{% block content %}

<h2>Review Article</h2>

<p>
    <strong>{{ article.title }}</strong>
</p>

<p>
Current status:
{{ article.get_status_display }}
</p>


<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Save Review
    </button>

</form>

{% endblock %}
