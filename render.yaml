databases:
  - name: verinews-db
    plan: free
    databaseName: verinews
    user: verinews

services:
  - type: web
    name: verinews
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod

      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: verinews-db
          property: connectionString

      - key: PYTHON_VERSION
        value: "3.12.3"

    healthCheckPath: /healthz/